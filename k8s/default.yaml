version: "1.0"
cluster: "sample-k8s-cluster"
environment: "prod"
description: "Production Kubernetes cluster using Cilium networking"

topology:
  node-labels:
    controlplane: "node-role.kubernetes.io/control-plane"
    etcd: "node-role.kubernetes.io/etcd"
    worker: "node-role.kubernetes.io/worker"
    monitoring: "monitoring"
    admin: "admin-cidr"

matrix:
  internal:
    - from: "worker"
      to: "controlplane"
      ports: [ 6443 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow worker nodes to access the Kubernetes API server"

    - from: "controlplane"
      to: "worker"
      ports: [ 10250 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow control-plane nodes to access the kubelet API on worker nodes"

    - from: "controlplane"
      to: "etcd"
      ports: [ 2379, 2380 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow control-plane nodes to access etcd client and peer ports"

    - from: "controlplane"
      to: "controlplane"
      ports: [ 10257, 10259 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow control-plane component communication for controller-manager
        and scheduler"

    - from: "worker"
      to: "worker"
      ports: [ 8472 ]
      protocol: "udp"
      action: "allow"
      description: "Allow node-to-node VXLAN traffic for Cilium overlay networking"

    - from: "worker"
      to: "worker"
      ports: [ 4244 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow Cilium Hubble relay/API communication between worker nodes"

    - from: "monitoring"
      to: "worker"
      ports: [ 9962, 9963 ]
      protocol: "tcp"
      action: "allow"
      description: "Allow monitoring systems to scrape Cilium metrics"

  external:
    - name: "Worker Example DNS UDP"
      from: "worker"
      endpoint: "192.0.2.53:53"
      protocol: "udp"
      action: "allow"
      description: "Workers can reach example DNS over UDP"

    - name: "Worker Example DNS TCP"
      from: "worker"
      endpoint: "192.0.2.53:53"
      protocol: "tcp"
      action: "allow"
      description: "Workers can reach example DNS over TCP"

    - name: "Control-plane Example DNS UDP"
      from: "controlplane"
      endpoint: "192.0.2.53:53"
      protocol: "udp"
      action: "allow"
      description: "Control-plane can reach example DNS over UDP"
